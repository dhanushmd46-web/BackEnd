name: CI

#Trigger: run on every push to main, and on pull request targetting main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # github provides a fresh unbuntu vm for every run (free)
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

        # step 3 : install all python packages
      - name: Install dependencies
        run: pip install -r requirements.txt

        #step 4 : run the tests
      - name: Run tests
        run: python -m pytest tests/ -v

        env:
          # provide the secrets the app needs during testing
          #these values are for CI only - use Github secrets for real values

          SECRET_KEY: test-secret-key-for-ci-only-not-production
          GEMINI_API_KEY: dummy-key-not-used-in-tests
